quarkus.datasource.postgresql.db-kind=postgresql
quarkus.datasource.postgresql.jdbc.url=jdbc:postgresql://localhost:5432/quarkus_test?user=quarkus_user&password=quarkus_test
quarkus.datasource.postgresql.enabled=false

quarkus.datasource.mysql.db-kind=mysql
quarkus.datasource.mysql.jdbc.url=jdbc:mysql://root:root@10.0.213.75:3306/otloukanek?rewriteBatchedStatements=true
quarkus.datasource.mysql.enabled=true

quarkus.datasource.mysql.jdbc.max-size=150
quarkus.datasource.mysql.jdbc.min-size=150
quarkus.datasource.mysql.jdbc.initial-size=150



quarkus.mongodb.devservices.enabled=false
quarkus.mongodb.main.connection-string=mongodb://quarkus_user:quarkus_test@localhost:27017
quarkus.mongodb.main.enabled=false
mongodb.database=quarkus_test

quarkus.datasource.jdbc.enable-metrics=false
quarkus.datasource.metrics.enabled=false

quarkus.log.level=INFO
quarkus.log.category."io.debezium".level=DEBUG
quarkus.log.file.enable=true
quarkus.log.file.path=logging/dmt.log
quarkus.log.file.rotation.max-file-size=150M
quarkus.http.host=0.0.0.0




quarkus.kubernetes-config.enabled=true
quarkus.kubernetes-config.config-maps=dmt-config
quarkus.kubernetes-client.trust-certs=true

#Number of retries for database requests
Retry/maxRetries=5
onstart.reset.database=true
quarkus.vertx.max-event-loop-execute-time=1000
quarkus.vertx.worker-pool-size=33


